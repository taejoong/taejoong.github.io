<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taejoong "Tijay" Chung</title>
  <meta name="description" content="Minimal academic homepage draft for Taejoong (Tijay) Chung.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script defer src="app.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <div class="brand">
        <a href="#home" id="brand-name">Taejoong "Tijay" Chung</a>
        <span id="brand-affiliation"></span>
      </div>
      <nav class="topnav" aria-label="Primary">
        <a href="#home">Home</a>
        <a href="#publications">Publications</a>
        <a href="research-platforms.html">Research Platforms</a>
        <a href="#students">Students</a>
        <a href="#grants">Grants</a>
        <a href="#teaching">Teaching</a>
        <a href="#service">Service</a>
      </nav>
    </div>
  </header>

  <div class="wrap page">
    <aside class="sidebar">
      <img class="profile-photo" src="assets/profile.jpg" alt="Taejoong Chung portrait">

      <div class="contact-block">
        <p id="sidebar-title" class="contact-title"></p>
        <p id="sidebar-affiliation" class="contact-text"></p>
        <p class="contact-text">Email: <a id="sidebar-email" href="#"></a></p>
      </div>

      <div id="sidebar-links" class="button-row"></div>

      <section class="sidebar-section">
        <h2>News</h2>
        <ul id="sidebar-updates" class="news-list"></ul>
      </section>
    </aside>

    <main class="content">
      <section id="home" class="content-section">
        <div class="bio-toolbar">
          <div class="view-toggle" id="bio-toggle" aria-label="Bio perspective">
            <button type="button" data-mode="first" class="is-active">First person</button>
            <button type="button" data-mode="third">Third person</button>
          </div>
          <button type="button" id="bio-copy-link" class="bio-copy-btn" aria-label="Copy shareable link to this bio" title="Copy shareable link">
            <svg class="bio-copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.5 1.5"></path>
              <path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.5-1.5"></path>
            </svg>
            <span class="bio-copy-label">Copy link</span>
          </button>
        </div>
        <div id="about-copy" class="about-copy"></div>
      </section>

      <section id="publications" class="content-section">
        <div class="section-heading-row">
          <h2 class="section-title section-title--compact">Publications</h2>
          <div class="view-toggle" id="publication-toggle" aria-label="Publication grouping">
            <button type="button" data-mode="year" class="is-active">Year</button>
            <button type="button" data-mode="topic">Topic</button>
          </div>
        </div>
        <div id="publications-content"></div>
      </section>

      <section id="grants" class="content-section">
        <h2 class="section-title">Grants</h2>
        <div id="grants-content"></div>
      </section>

      <section id="students" class="content-section">
        <h2 class="section-title">Students</h2>
        <div id="students-content"></div>
      </section>

      <section id="teaching" class="content-section">
        <h2 class="section-title">Teaching</h2>
        <ul id="teaching-list" class="simple-list"></ul>
      </section>

      <section id="service" class="content-section">
        <h2 class="section-title">Service</h2>
        <ul id="service-list" class="simple-list"></ul>
      </section>
    </main>
  </div>

  <script
    id="counterscale-script"
    data-site-id="taejoong-homepage"
    src="https://counterscale.netsecurelab.org/tracker.js"
    defer
  ></script>
  <script>
    (function(){
      var i = new Image();
      i.referrerPolicy = "no-referrer-when-downgrade";
      i.src = "https://iplog.netsecurelab.org/p.gif?p=" + encodeURIComponent(location.pathname) + "&t=" + Date.now();
    })();
  </script>
  <noscript><img src="https://iplog.netsecurelab.org/p.gif?p=/" width="1" height="1" alt=""></noscript>

  <!-- Clicky Tracking Code -->
  <script>var clicky_site_ids = clicky_site_ids || []; clicky_site_ids.push(101097193);</script>

  <noscript><p><img alt="Clicky" width="1" height="1" src="//in.getclicky.com/101097193ns.gif" /></p></noscript>
</body>

</html>
